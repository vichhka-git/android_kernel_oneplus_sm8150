name: Build & Release Kernel (KernelSU-Next)

on:
  push:
    branches:
      - lineage-23.2
      - copilot/add-kernelsu-next-integration
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0). Leave empty to auto-generate.'
        required: false
        default: ''

jobs:
  build:
    name: Build sm8150 Kernel
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc \
            bison \
            build-essential \
            ca-certificates \
            clang \
            flex \
            git \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            make \
            python3 \
            zip \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Set build variables
        id: vars
        run: |
          echo "KERNEL_VERSION=$(make kernelversion -s)" >> "$GITHUB_OUTPUT"
          echo "BUILD_DATE=$(date +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"
          CLANG_VERSION=$(clang --version | head -1)
          echo "CLANG_VERSION=$CLANG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure kernel
        run: |
          make O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            vendor/sm8150_defconfig vendor/oplus.config

      - name: Build kernel
        run: |
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Package kernel images
        run: |
          mkdir -p dist
          cp out/arch/arm64/boot/Image        dist/Image         2>/dev/null || true
          cp out/arch/arm64/boot/Image.gz     dist/Image.gz      2>/dev/null || true
          cp out/arch/arm64/boot/Image.gz-dtb dist/Image.gz-dtb  2>/dev/null || true
          cp out/vmlinux                      dist/vmlinux       2>/dev/null || true
          cp out/System.map                   dist/System.map    2>/dev/null || true

          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="kernel-${{ steps.vars.outputs.KERNEL_VERSION }}-ksu-${{ steps.vars.outputs.BUILD_DATE }}"
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Build AnyKernel3 flashable zip
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel3

          # Configure anykernel.sh for SM8150 OnePlus devices
          cat > anykernel3/anykernel.sh << 'EOF'
          # AnyKernel3 - OnePlus SM8150 (KernelSU-Next)
          # osm0sis @ xda-developers

          ## AnyKernel setup
          kernel.string=OnePlus SM8150 Kernel + KernelSU-Next
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=guacamoleb
          device.name2=guacamole
          device.name3=fajita
          device.name4=hotdogb
          device.name5=hotdog

          ## AnyKernel methods (DO NOT CHANGE)
          . tools/ak3-core.sh

          ## AnyKernel install
          split_boot
          flash_boot
          ## end boot install
          EOF

          # Copy the best available kernel image
          if [ -f dist/Image.gz-dtb ]; then
            cp dist/Image.gz-dtb anykernel3/Image.gz-dtb
          elif [ -f dist/Image.gz ]; then
            cp dist/Image.gz anykernel3/Image.gz
          elif [ -f dist/Image ]; then
            cp dist/Image anykernel3/Image
          fi

          cd anykernel3
          zip -r9 "../dist/AnyKernel3-sm8150-kernelsu-next-${RELEASE_TAG}.zip" \
            . \
            -x ".git/*" "*.md" "LICENSE" "*.gitignore"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-sm8150-kernelsu-next-${{ steps.vars.outputs.BUILD_DATE }}
          path: |
            dist/Image
            dist/Image.gz
            dist/Image.gz-dtb
            dist/vmlinux
            dist/System.map
            dist/AnyKernel3-*.zip
          if-no-files-found: warn

      - name: Create GitHub Release
        if: >
          github.ref == 'refs/heads/lineage-23.2' ||
          github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Kernel ${{ steps.vars.outputs.KERNEL_VERSION }} + KernelSU-Next (${{ steps.vars.outputs.BUILD_DATE }})"
          body: |
            ## OnePlus SM8150 Kernel with KernelSU-Next

            **Kernel version:** `${{ steps.vars.outputs.KERNEL_VERSION }}`
            **Build date:** `${{ steps.vars.outputs.BUILD_DATE }}`
            **Compiler:** `${{ steps.vars.outputs.CLANG_VERSION }}`
            **Defconfig:** `vendor/sm8150_defconfig` + `vendor/oplus.config`

            ### Supported devices
            | Device | Codename |
            |--------|----------|
            | OnePlus 7 | guacamoleb |
            | OnePlus 7 Pro | guacamole / fajita |
            | OnePlus 7T | hotdogb |
            | OnePlus 7T Pro | hotdog |

            ### How to flash
            1. Download `AnyKernel3-sm8150-kernelsu-next-*.zip` from the assets below.
            2. Boot into **TWRP** or another custom recovery.
            3. Flash the downloaded `.zip` file.
            4. Reboot to system.
            5. Install the **KernelSU-Next** manager app from https://github.com/rifsxd/KernelSU-Next/releases
            6. Open the app — it should show root access is available.

            > **Full flashing guide:** see [FLASH.md](https://github.com/${{ github.repository }}/blob/lineage-23.2/FLASH.md)

            ### Notes
            - KernelSU-Next is built directly into the kernel — no patching needed.
            - If you were previously using Magisk, disable or uninstall it first.
            - Back up your data before flashing any kernel.
          files: |
            dist/Image
            dist/Image.gz
            dist/Image.gz-dtb
            dist/AnyKernel3-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
